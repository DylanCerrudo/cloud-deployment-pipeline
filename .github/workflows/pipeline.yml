name: Cloud Pipeline CI

on:
  push:
    branches: [ "main" ] # run this workflow everytime we push to main

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Github gives a fresh Linux machine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        #pulls the repo code into the runner

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
        #prepares Docker environment

      - name: Build Docker image
        run: docker build -t cloud-pipeline .
        # builds the Flask app into a container

      - name: Run container
        run: docker run -d --name cloud-pipeline-api -p 5000:80 cloud-pipeline
        # starts the container in background

      - name: Wait for service
        run: sleep 5
        # gives Flask time to start

      - name: Test API
        run: curl --fail http://localhost:5000/health
        # hits the API to make sure it works

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
        # lets GitHub Actions connect to AWS

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        # logs Docker into AWS ECR
      
      - name: Push image to Amazon ECR 
        run: |
          docker tag cloud-pipeline:latest 071273296623.dkr.ecr.us-east-2.amazonaws.com/cloud-pipeline:latest
          docker push 071273296623.dkr.ecr.us-east-2.amazonaws.com/cloud-pipeline:latest
        # uploads the image to the ECR repo

      - name: Show container logs
        if: always()
        run: docker logs cloud-pipeline-api
        # prints logs even if a step fails




